[env:lolin_c3_mini]
platform = espressif32 @ 6.9.0
board = lolin_c3_mini
framework = arduino

monitor_speed = 115200
upload_speed = 460800

; Helps PlatformIO resolve library dependencies more reliably
lib_ldf_mode = chain+

lib_deps =
  waspinator/AccelStepper @ ^1.64
  git+https://github.com/STEMpedia/DabbleESP32.git#master

extra_scripts =
  pre:scripts/patch_dabble.py

build_flags =
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D CORE_DEBUG_LEVEL=0
