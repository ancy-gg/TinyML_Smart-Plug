<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>TinyML Smart Plug</title>
  <style>
    :root{ color-scheme:dark; }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:#f3f3f3;
      background:radial-gradient(1200px 700px at 50% -240px, #2a2a2d 0%, #121214 60%, #0b0b0c 100%);
      padding:24px;
    }
    .card{
      width:min(520px, 100%);
      padding:28px;
      border-radius:20px;
      border:1px solid rgba(255,255,255,0.10);
      background:rgba(255,255,255,0.04);
      box-shadow:0 16px 40px rgba(0,0,0,0.45);
    }
    h1{ margin:0 0 12px; font-size:28px; }
    p{ margin:0 0 14px; color:rgba(255,255,255,0.72); line-height:1.6; }
    a{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:44px;
      padding:0 14px;
      border-radius:12px;
      background:rgba(46,204,113,0.16);
      border:1px solid rgba(46,204,113,0.32);
      color:#d5ffe4;
      text-decoration:none;
      font-weight:800;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Page not found</h1>
    <p>The TinyML Smart Plug dashboard could not find that page. Return to the main dashboard to continue monitoring your device.</p>
    <a href="index.html">Go to dashboard</a>
  </div>
</body>
</html>
